services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mis}
      POSTGRES_DB: ${POSTGRES_DB:-mis_task_tracker_development}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mis} -d ${POSTGRES_DB:-mis_task_tracker_development}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      args:
        RUBY_VERSION: "3.4.3"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-mis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mis}
      POSTGRES_DB: ${POSTGRES_DB:-mis_task_tracker_development}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-mis_task_tracker_test}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    tty: true
    stdin_open: true
    command: >
      bash -c "
        bundle check || bundle install &&
        bundle exec rails db:prepare &&
        bundle exec rails db:seed &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "

volumes:
  pgdata:
  bundle_cache:
